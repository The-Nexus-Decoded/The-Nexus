---
# =============================================================================
# Role: openclaw — Install OpenClaw bare-metal with Node.js 22
# MUST run AFTER 'base' role (needs openclaw user and sudo)
# MUST run AFTER 'data-drive' role (needs /data mount)
# =============================================================================

# --- Assert /data is mounted before creating directories ---

- name: Assert /data is a mount point
  ansible.builtin.command: mountpoint -q /data
  changed_when: false
  register: data_mountpoint_check
  failed_when: data_mountpoint_check.rc != 0

# --- Node.js 22 via NodeSource ---

- name: Add NodeSource GPG key and repository
  ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js 22
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true

- name: Verify Node.js version is 22+
  ansible.builtin.command: node --version
  register: node_version
  changed_when: false
  failed_when: "node_version.stdout is not match('v22\\.')"

# --- Install OpenClaw ---

- name: Install OpenClaw via npm
  community.general.npm:
    name: openclaw
    global: true
    state: present

- name: Verify OpenClaw installed
  ansible.builtin.command: openclaw --version
  register: openclaw_version_output
  changed_when: false

- name: Install codex wrapper for CLI backend agents
  ansible.builtin.copy:
    src: codex-wrapper
    dest: /usr/local/bin/codex-wrapper
    owner: root
    group: root
    mode: "0755"
  become: true

# --- Headless systemd fix ---

- name: Look up UID for {{ server_user }}
  ansible.builtin.command: id -u {{ server_user }}
  register: server_user_id_result
  changed_when: false

- name: Set server_user_uid fact
  ansible.builtin.set_fact:
    server_user_uid: "{{ server_user_id_result.stdout }}"

- name: Enable loginctl linger for openclaw user
  ansible.builtin.command: loginctl enable-linger {{ server_user }}
  become: true
  changed_when: false

# XDG_RUNTIME_DIR via systemd environment.d (works for systemd services, not just interactive shells)
- name: Ensure environment.d directory exists
  ansible.builtin.file:
    path: /home/{{ server_user }}/.config/environment.d
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0755"

- name: Set XDG_RUNTIME_DIR via environment.d
  ansible.builtin.copy:
    dest: /home/{{ server_user }}/.config/environment.d/xdg.conf
    content: "XDG_RUNTIME_DIR=/run/user/{{ server_user_uid }}\n"
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: "0644"

# --- Create OpenClaw directories ---

- name: Create OpenClaw workspace directory
  ansible.builtin.file:
    path: /data/openclaw/workspace
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: '0755'

- name: Create OpenClaw logs directory
  ansible.builtin.file:
    path: /data/openclaw/logs
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: '0755'

- name: Create OpenClaw scripts directory
  ansible.builtin.file:
    path: /data/openclaw/scripts
    state: directory
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: '0755'

- name: Symlink ~/.openclaw to /data/openclaw
  ansible.builtin.file:
    src: /data/openclaw
    dest: /home/{{ server_user }}/.openclaw
    state: link
    owner: "{{ server_user }}"
    force: true

# --- Deploy SOUL.md ---

- name: Deploy server-specific SOUL.md
  ansible.builtin.copy:
    src: "soul-{{ server_role }}.md"
    dest: /data/openclaw/workspace/SOUL.md
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: '0644'

# --- Deploy openclaw.json ---

- name: Deploy openclaw.json
  ansible.builtin.template:
    src: openclaw.json.j2
    dest: /data/openclaw/openclaw.json
    owner: "{{ server_user }}"
    group: "{{ server_user }}"
    mode: '0600'
  notify: restart openclaw gateway

# --- Set gateway mode (required before first start) ---

- name: Set gateway mode to local
  ansible.builtin.command: openclaw config set gateway.mode local
  become_user: "{{ server_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ server_user_uid }}"
  changed_when: false

# --- Install and start gateway service ---

- name: Install OpenClaw gateway systemd service
  ansible.builtin.command: openclaw gateway install
  become_user: "{{ server_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ server_user_uid }}"
  register: gateway_install_result
  changed_when: "'already' not in gateway_install_result.stdout | default('')"
  ignore_errors: false

- name: Check if OpenClaw gateway is enabled
  ansible.builtin.command: systemctl --user is-enabled openclaw-gateway
  become_user: "{{ server_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ server_user_uid }}"
  register: gateway_enabled_check
  ignore_errors: true
  changed_when: false

- name: Display gateway enabled status
  ansible.builtin.debug:
    msg: "OpenClaw gateway service enabled: {{ gateway_enabled_check.stdout | default('unknown') }}"

- name: Check if OpenClaw gateway is already running
  ansible.builtin.command: systemctl --user is-active openclaw-gateway
  become_user: "{{ server_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ server_user_uid }}"
  register: gateway_active_check
  ignore_errors: true
  changed_when: false

- name: Start OpenClaw gateway service (only if not running)
  ansible.builtin.command: openclaw gateway start
  become_user: "{{ server_user }}"
  environment:
    XDG_RUNTIME_DIR: "/run/user/{{ server_user_uid }}"
  register: gateway_start_result
  changed_when: true
  when: gateway_active_check.stdout | default('') != 'active'

# --- Health check ---

- name: Wait for OpenClaw gateway health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:18789/health"
    method: GET
    status_code: 200
  register: gateway_health
  retries: 6
  delay: 5
  until: gateway_health.status | default(0) == 200
  ignore_errors: true

- name: Display gateway health status
  ansible.builtin.debug:
    msg: "OpenClaw gateway health: {{ 'HEALTHY' if gateway_health.status | default(0) == 200 else 'NOT RESPONDING — check logs at /data/openclaw/logs/openclaw.log' }}"
