---
# =============================================================================
# OpenClaw Homelab — Multi-Agent Gateway Deployment
# Deploys additional OpenClaw agent profiles on a server.
# Each profile gets its own port, workspace, config, systemd service, and
# Discord bot token.
#
# Usage:
#   # Deploy all agents defined for a server:
#   ansible-playbook playbooks/deploy-agents.yml --limit ola-claw-dev
#
#   # Deploy a single agent:
#   ansible-playbook playbooks/deploy-agents.yml --limit ola-claw-dev \
#     -e "deploy_agent=alfred"
#
#   # Deploy agents from agentstructure/ workspace files:
#   ansible-playbook playbooks/deploy-agents.yml --limit ola-claw-dev \
#     -e "deploy_workspace_from=agentstructure"
#
# Prerequisites:
#   - OpenClaw must already be installed (use openclaw.yml or reinstall-openclaw.yml)
#   - Discord bot tokens must be in vault/secrets.yml
#   - Agent workspace files must exist in agentstructure/{agent}/ in the repo
#
# Required host_vars per server — extra_agents list:
#   extra_agents:
#     - name: alfred
#       port: 18810
#       discord_bot_token: "{{ vault_alfred_discord_token }}"
#       discord_channels:
#         "1475083038810443878": { allow: true, requireMention: true }  # #coding
#         "1475082874234343621": { allow: true, requireMention: true }  # #the-nexus
#       llm_provider: minimax
# =============================================================================

- name: Deploy multi-agent OpenClaw gateways
  hosts: all
  become: true
  vars:
    deploy_agent: ""  # empty = deploy all agents in extra_agents list
    deploy_workspace_from: "agentstructure"  # source dir in repo for workspace files
    nexus_repo_root: "/data/openclaw/workspace/The-Nexus"
    workspace_files:
      - SOUL.md
      - AGENTS.md
      - OPERATIONS.md
      - TEAM.md
      - GIT-RULES.md
      - DISCORD-RULES.md
      - SECURITY.md
      - REPO-MAP.md

  pre_tasks:
    - name: Look up UID for {{ server_user }}
      ansible.builtin.command: id -u {{ server_user }}
      register: server_user_id_result
      changed_when: false

    - name: Set server_user_uid fact
      ansible.builtin.set_fact:
        server_user_uid: "{{ server_user_id_result.stdout }}"

    - name: Verify OpenClaw is installed
      ansible.builtin.command: openclaw --version
      register: openclaw_ver
      changed_when: false

    - name: Display OpenClaw version
      ansible.builtin.debug:
        msg: "OpenClaw {{ openclaw_ver.stdout }} on {{ inventory_hostname }}"

    - name: Filter to single agent if deploy_agent is set
      ansible.builtin.set_fact:
        agents_to_deploy: "{{ extra_agents | selectattr('name', 'equalto', deploy_agent) | list }}"
      when: deploy_agent != ""

    - name: Use full agent list if no filter
      ansible.builtin.set_fact:
        agents_to_deploy: "{{ extra_agents | default([]) }}"
      when: deploy_agent == ""

    - name: Display agents to deploy
      ansible.builtin.debug:
        msg: "Deploying {{ agents_to_deploy | length }} agent(s): {{ agents_to_deploy | map(attribute='name') | list }}"

  tasks:
    # =========================================================================
    # PER-AGENT DEPLOYMENT (loop over agents_to_deploy)
    # =========================================================================

    - name: "{{ item.name }} — Create profile config directory"
      ansible.builtin.file:
        path: "/home/{{ server_user }}/.openclaw-{{ item.name }}"
        state: directory
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0700"
      loop: "{{ agents_to_deploy }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "{{ item.name }} — Create workspace directory"
      ansible.builtin.file:
        path: "/home/{{ server_user }}/.openclaw/workspace-{{ item.name }}"
        state: directory
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0755"
      loop: "{{ agents_to_deploy }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "{{ item.name }} — Create logs directory"
      ansible.builtin.file:
        path: "/data/openclaw/logs"
        state: directory
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0755"
      loop: "{{ agents_to_deploy }}"
      loop_control:
        label: "{{ item.name }}"

    - name: "{{ item.name }} — Deploy openclaw.json"
      ansible.builtin.template:
        src: openclaw-agent.json.j2
        dest: "/home/{{ server_user }}/.openclaw-{{ item.name }}/openclaw.json"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0600"
      loop: "{{ agents_to_deploy }}"
      loop_control:
        label: "{{ item.name }}"

    # --- Deploy workspace files from agentstructure/{agent}/ ---

    - name: "{{ item.0.name }} — Deploy workspace file {{ item.1 }}"
      ansible.builtin.copy:
        src: "{{ nexus_repo_root }}/{{ deploy_workspace_from }}/{{ item.0.name }}/{{ item.1 }}"
        dest: "/home/{{ server_user }}/.openclaw/workspace-{{ item.0.name }}/{{ item.1 }}"
        remote_src: true
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0644"
      loop: "{{ agents_to_deploy | product(workspace_files) | list }}"
      loop_control:
        label: "{{ item.0.name }}/{{ item.1 }}"
      ignore_errors: true  # Some agents may not have all files yet

    # --- Systemd service ---

    - name: "{{ item.name }} — Deploy systemd user service"
      ansible.builtin.template:
        src: openclaw-gateway-agent.service.j2
        dest: "/home/{{ server_user }}/.config/systemd/user/openclaw-gateway-{{ item.name }}.service"
        owner: "{{ server_user }}"
        group: "{{ server_user }}"
        mode: "0644"
      loop: "{{ agents_to_deploy }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Reload systemd user daemon
      ansible.builtin.command: systemctl --user daemon-reload
      become_user: "{{ server_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ server_user_uid }}"
      changed_when: false

    - name: Enable loginctl linger for systemd user services
      ansible.builtin.command: loginctl enable-linger {{ server_user }}
      changed_when: false

    - name: "{{ item.name }} — Enable and start gateway service"
      ansible.builtin.command: systemctl --user enable --now openclaw-gateway-{{ item.name }}
      become_user: "{{ server_user }}"
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ server_user_uid }}"
      loop: "{{ agents_to_deploy }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    # --- Health checks ---

    - name: "{{ item.name }} — Wait for gateway health"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ item.port }}/health"
        method: GET
        status_code: 200
      register: agent_health
      retries: 6
      delay: 5
      until: agent_health.status | default(0) == 200
      ignore_errors: true
      loop: "{{ agents_to_deploy }}"
      loop_control:
        label: "{{ item.name }}:{{ item.port }}"

    # =========================================================================
    # SUMMARY
    # =========================================================================

    - name: Deployment summary
      ansible.builtin.debug:
        msg: |
          ============================================
          MULTI-AGENT DEPLOYMENT COMPLETE
          ============================================
          Server:  {{ inventory_hostname }}
          {% for agent in agents_to_deploy %}
          Agent:   {{ agent.name }} (port {{ agent.port }})
          {% endfor %}
          ============================================
