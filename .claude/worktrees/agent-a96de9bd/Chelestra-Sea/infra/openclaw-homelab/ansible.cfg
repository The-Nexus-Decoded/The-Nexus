[defaults]
inventory = inventory/hosts.yml
vault_password_file = .vault_pass
remote_user = openclaw
roles_path = roles

# Increase timeout for initial provisioning
timeout = 30

# Show task execution time
callbacks_enabled = profile_tasks

# Host key checking: disabled here for convenience during development.
# For bootstrap of fresh installs, pass as CLI arg instead:
#   ansible-playbook playbooks/site.yml -e 'ansible_ssh_extra_args="-o StrictHostKeyChecking=no"'

[ssh_connection]
pipelining = True
