---
# =============================================================================
# OpenClaw Homelab — OpenClaw-only Playbook
# Installs/updates OpenClaw without re-running tailscale or base hardening
#
# Usage:
#   ansible-playbook playbooks/openclaw.yml
#   ansible-playbook playbooks/openclaw.yml --limit ola-claw-dev
# =============================================================================

- name: Install and configure OpenClaw
  hosts: all
  become: true
  vars_files:
    - "{{ playbook_dir }}/../vault/secrets.yml"
  roles:
    - openclaw
