---
# =============================================================================
# Role: ollama — Install Ollama local LLM with GPU support
# MUST run AFTER 'nvidia' role (needs GPU drivers for CUDA)
# =============================================================================

- name: Skip Ollama setup (ollama_install is false)
  ansible.builtin.debug:
    msg: "Skipping Ollama installation (ollama_install={{ ollama_install }})"
  when: not ollama_install

- name: Ollama installation and configuration
  when: ollama_install
  block:
    # --- Install Ollama ---

    - name: Install Ollama via official install script
      ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
      args:
        creates: /usr/local/bin/ollama

    # --- Systemd override for GPU and network config ---

    - name: Create Ollama systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/ollama.service.d
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy Ollama systemd override
      ansible.builtin.template:
        src: ollama-override.conf.j2
        dest: /etc/systemd/system/ollama.service.d/override.conf
        owner: root
        group: root
        mode: "0644"
      notify: restart ollama

    # --- Enable and start Ollama ---

    - name: Enable and start Ollama service
      ansible.builtin.systemd:
        name: ollama
        state: started
        enabled: true
        daemon_reload: true

    # --- Pull default model ---

    - name: Check if default model is already pulled
      ansible.builtin.command: ollama list
      register: ollama_models
      changed_when: false

    - name: Pull default Ollama model ({{ ollama_model }})
      ansible.builtin.command: ollama pull {{ ollama_model }}
      when: ollama_model not in ollama_models.stdout
      async: 600
      poll: 15

    # --- UFW rule: allow Ollama on Tailscale only ---

    - name: Allow Ollama port on tailscale0 only
      community.general.ufw:
        rule: allow
        interface: tailscale0
        direction: in
        port: "{{ ollama_port | string }}"
        proto: tcp
        comment: "Ollama API — Tailscale only"

    # --- Health check ---

    - name: Wait for Ollama to be healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ ollama_port }}/api/tags"
        method: GET
        return_content: true
        status_code: 200
      register: ollama_health
      retries: 6
      delay: 5
      until: ollama_health.status == 200

    - name: Display Ollama status
      ansible.builtin.debug:
        msg: "Ollama is running. Available models: {{ (ollama_health.content | from_json).models | map(attribute='name') | list }}"
