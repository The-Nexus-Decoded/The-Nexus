---
# =============================================================================
# Handlers: base role
# =============================================================================

- name: restart ssh
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: reload ufw
  ansible.builtin.command: ufw reload
  changed_when: true
