# =============================================================================
# OpenClaw Homelab — Ansible Inventory
# =============================================================================
#
# BOOTSTRAP SETUP — TWO-STEP PROCESS:
#
# STEP 1 (First run — Bootstrap):
#   Before the very first ansible-playbook run, replace the placeholder LAN IPs
#   below with the actual LAN IP addresses of each server. You can find these
#   by running `ip addr` on each machine or checking your router's DHCP table.
#
#   Placeholder → Actual:
#     ola-claw-main:  192.168.1.X  →  e.g., 192.168.1.101
#     ola-claw-trade: 192.168.1.Y  →  e.g., 192.168.1.102
#     ola-claw-dev:   192.168.1.Z  →  e.g., 192.168.1.103
#
# STEP 2 (All subsequent runs — Post-Tailscale):
#   After the playbook installs Tailscale and prints each server's Tailscale IP
#   (in the 100.x.x.x range), update the hosts below to use those Tailscale IPs.
#   From that point forward, all Ansible runs go through the encrypted VPN tunnel.
#
#   Example after Tailscale install:
#     ola-claw-main:  192.168.1.101  →  100.x.x.x  (from playbook debug output)
#     ola-claw-trade: 192.168.1.102  →  100.x.x.y
#     ola-claw-dev:   192.168.1.103  →  100.x.x.z
#
# =============================================================================

all:
  children:
    ola_claw_main:
      hosts:
        ola-claw-main:
          ansible_host: "100.103.189.117"  # Tailscale IP
    ola_claw_trade:
      hosts:
        ola-claw-trade:
          ansible_host: "100.104.166.53"  # Tailscale IP
    ola_claw_dev:
      hosts:
        ola-claw-dev:
          ansible_host: "100.94.203.10"  # Tailscale IP
