name: Deploy Patryn Trader MVP

on:
  push:
    branches:
      - main
    paths:
      - 'combined_runner.py'
      - 'hughs-forge/**'
      - 'src/signals/**'
      - '.github/workflows/deploy-mvp.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, linux, tailscale]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to Trade Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.TRADE_SERVER_HOST }}
        username: ${{ secrets.TRADE_SERVER_USER }}
        key: ${{ secrets.TRADE_SERVER_SSH_KEY }}
        script: |
          set -e
          DEPLOY_DIR="/data/openclaw/workspace/Pryan-Fire"
          VENV="$DEPLOY_DIR/hughs-forge/services/trade-orchestrator/venv"

          # 1. Pull latest code
          cd "$DEPLOY_DIR"
          git fetch origin main
          git reset --hard origin/main
          echo "Code synced to $(git rev-parse --short HEAD)"

          # 2. Install/update dependencies
          if [ ! -d "$VENV" ]; then
            python3 -m venv "$VENV"
          fi
          "$VENV/bin/pip" install -q --upgrade pip
          "$VENV/bin/pip" install -q -r hughs-forge/services/trade-orchestrator/requirements.txt

          # 3. Restart service
          systemctl --user restart patryn-trader
          sleep 3
          systemctl --user is-active patryn-trader && echo "Service running" || (echo "Service failed!" && exit 1)

          # 4. Quick health check
          curl -sf http://127.0.0.1:8002/health && echo " — Health OK" || echo "Health endpoint not ready yet"

          echo "Deploy complete: $(git log --oneline -1)"
